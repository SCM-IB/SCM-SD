defaults:
  - default_dataset.yaml

exp_name: colmap_dataset_structural_distillation

# Global variables for interpolation
img_size: 518
num_workers: 8
seed_value: 42
accum_steps: 2   #default: 2
patch_size: 14
max_img_per_gpu: 8   # 24

train:
  img_size: ${img_size}
  num_workers: ${num_workers}
  seed_value: ${seed_value}
  accum_steps: ${accum_steps}
  patch_size: ${patch_size}

val_epoch_freq: 5

limit_train_batches: 800   # 每个 epoch 训练 batch 数
limit_val_batches: 400    # 每个 epoch 验证 batch 数

data:
  train:
    _target_: data.scene_based_dataloader.SceneBasedDynamicDataset
    num_workers: ${num_workers}
    max_img_per_gpu: ${max_img_per_gpu}
    common_config:
      img_size: ${img_size}
      patch_size: ${patch_size}
      debug: False
      repeat_batch: False
    dataset:
      _target_: data.composed_dataset.ComposedDataset
      dataset_configs:
        - _target_: data.datasets.colmapdata.ColmapDataset
          split: train
          COLMAP_DIR: e:\Paper2\1\vggt-our\dataset
          min_num_images: 12
          expand_ratio: 1
          rgb_dir: rgb
          thermal_dir: thermal
          camera_dir: colmap/sparse/0
          depth_gt_dir: depth_aligned
  val:
    _target_: data.scene_based_dataloader.SceneBasedDynamicDataset
    num_workers: ${num_workers}
    max_img_per_gpu: ${max_img_per_gpu}
    common_config:
      img_size: ${img_size}
      patch_size: ${patch_size}
      debug: False
    dataset:
      _target_: data.composed_dataset.ComposedDataset
      dataset_configs:
        - _target_: data.datasets.colmapdata.ColmapDataset
          split: test
          COLMAP_DIR: e:\Paper2\1\vggt-our\dataset
          min_num_images: 12 
          expand_ratio: 1
          rgb_dir: rgb
          thermal_dir: thermal
          camera_dir: colmap/sparse/0
          depth_gt_dir: depth_aligned

logging_conf:
  log_dir: logs/${exp_name}
  log_visuals: False
  log_freq: 1
  log_level_primary: DEBUG
  log_level_secondary: WARNING
  all_ranks: False
  tensorboard_writer:
    _target_: train_utils.tb_writer.TensorBoardLogger
    path: ${logging_conf.log_dir}/tensorboard
  scalar_keys_to_log:
    train:
      keys_to_log:
        - loss_objective
        - infrared_loss_camera
        - infrared_loss_T
        - infrared_loss_R
        - infrared_loss_FL
        - infrared_loss_conf_depth
        - infrared_loss_reg_depth
        - infrared_loss_grad_depth
        - structural_structure_preservation
        - structural_conditional_compression
        - structural_uncertainty_distillation
    val:
      keys_to_log:
        - loss_objective
        - infrared_loss_camera
        - infrared_loss_T
        - infrared_loss_R
        - infrared_loss_FL
        - infrared_loss_conf_depth
        - infrared_loss_reg_depth
        - infrared_loss_grad_depth
        - structural_structure_preservation
        - structural_conditional_compression
        - structural_uncertainty_distillation
checkpoint:
  save_dir: logs/${exp_name}/ckpts
  save_freq: 5
  resume_checkpoint_path: null
  strict: False

loss:
  _target_: training.structural_distillation_loss.StructuralDistillationLoss
  camera:
    weight: 5.0
    loss_type: "l1"
  depth:
    weight: 1.0
    gradient_loss_fn: "grad"
    valid_range: 0.98
  structural_distillation:
    delta: 0.1
    tau_g: 0.1
    tau: 0.1
    topk: 32
    candidate_strategy: "A+B"
    max_candidates: 16
    embed_dim: 2048  # 注意：这里是2048，因为Aggregator输出的是2*1024=2048
    critic_dim: 256
    weight: 1.0  # 结构蒸馏总损失权重
    use_uncertainty: False
    uncertainty_weight: 1.0  # 不确定性蒸馏损失权重
    # 子损失权重配置
    structure_preservation_weight: 0.1  # a: 结构保持损失权重
    conditional_compression_weight: 0.01  # b: 条件压缩损失权重
    uncertainty_distillation_weight: 1.0  # c: 不确定性蒸馏损失权重

optim:
  param_group_modifiers: False

  optimizer:
    _target_: torch.optim.AdamW
    lr: 5e-5
    weight_decay: 0.05

  frozen_module_names:
      - "*visible*"  # 冻结teacher分支
      - "*infrared_aggregator.patch_embed*"  # 冻结学生网络的dino编码部分
  amp:
    enabled: True
    amp_dtype: bfloat16
  gradient_clip:
    _target_: train_utils.gradient_clip.GradientClipper
    configs:
      - module_name: ["infrared_aggregator"]
        max_norm: 1.0
        norm_type: 2
      - module_name: ["infrared_depth"]
        max_norm: 1.0
        norm_type: 2
      - module_name: ["infrared_camera"]
        max_norm: 1.0
        norm_type: 2
  options:
    lr:
      - scheduler:
          _target_: fvcore.common.param_scheduler.CompositeParamScheduler
          schedulers:
            - _target_: fvcore.common.param_scheduler.LinearParamScheduler
              start_value: 1e-8
              end_value: 5e-5
            - _target_: fvcore.common.param_scheduler.CosineParamScheduler
              start_value: 5e-5
              end_value: 1e-8
          lengths: [0.05, 0.95]
          interval_scaling: ['rescaled', 'rescaled']
    weight_decay:
      - scheduler:
          _target_: fvcore.common.param_scheduler.ConstantParamScheduler
          value: 0.05

max_epochs: 20

model:
  _target_: vggt.models.vggt.VGGTDualBranch
  enable_camera: True
  enable_depth: True
  enable_point: False
  enable_track: False
  visible_model_path: ckpt/model.pt  # 预训练的teacher模型路径
  infrared_model_path: null  # 学生网络预训练权重路径，null表示不加载
  init_infrared_from_visible: true  # 是否从教师网络初始化学生网络，true表示从教师初始化，false表示从0开始训练

# DDP settings
distributed:
  backend: nccl
  comms_dtype: None
  find_unused_parameters: False
  timeout_mins: 30
  gradient_as_bucket_view: True
  bucket_cap_mb: 25
  broadcast_buffers: True

cuda:
    cudnn_deterministic: False
    cudnn_benchmark: False
    allow_tf32: True
